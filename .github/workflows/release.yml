# Publish arcsolve via PyPI Trusted Publishing (OIDC — no API tokens).
#   - workflow_dispatch  → TestPyPI (rehearsal)
#   - push tag `v*`      → PyPI (release)
#
# One-time setup: register a "pending publisher" on PyPI **and** TestPyPI linking
#   project = arcsolve · owner = ArcSolver · repo = ArcSolve-Kit
#   workflow = release.yml · environment = (leave blank)
# Docs: https://docs.pypi.org/trusted-publishers/
#
# Actions below are pinned to commit SHAs (version in the trailing comment) for
# supply-chain safety — bump the SHA and comment together when updating.
name: Publish

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write        # required for OIDC trusted publishing
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.11"

      - name: Verify tag matches __version__ (release only)
        if: github.event_name == 'push'
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          VER="$(grep -oE '__version__ *= *"[^"]+"' arcsolve/__init__.py | grep -oE '[0-9][^"]*')"
          echo "tag=$TAG  __version__=$VER"
          test "$TAG" = "$VER" || { echo "::error::태그 v$TAG 와 __version__ $VER 불일치"; exit 1; }

      - name: Build (clean)
        run: |
          rm -rf dist build
          uv build

      - name: Guard — no sensitive/local files in sdist
        run: |
          if tar tzf dist/*.tar.gz | grep -Eiq '(^|/)[.](claude|env|git)(/|$)|credential'; then
            echo "::error::sdist에 민감/로컬 파일 포함"
            tar tzf dist/*.tar.gz | grep -Ei '[.]claude|[.]env|[.]git/|credential'
            exit 1
          fi

      - name: Publish to TestPyPI (rehearsal — manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: uv publish --publish-url https://test.pypi.org/legacy/ --trusted-publishing always

      - name: Publish to PyPI (release — tag push)
        if: github.event_name == 'push'
        run: uv publish --trusted-publishing always
